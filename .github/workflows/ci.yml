name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: extractions/setup-just@v2
      - name: Check (fmt + vet)
        run: just check
      - name: Build
        run: just build
      - name: Unit tests
        run: just test-race

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: extractions/setup-just@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Integration tests
        run: just test-integration
